<mat-card
    appearance="outlined"
>
    <mat-card-header>
        <mat-card-title>
            Add a Custom Topping
        </mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <mat-form-field>
            <mat-label>Custom Topping</mat-label>
            <input 
                matInput
                [value]= "customTopping()"
                >
  </mat-form-field>

        <button
        matButton="elevated"
        (click)="customTopping()"
        >
            Add
        </button>
        <br>
        {{customToppingList()}}
    </mat-card-content>
</mat-card>
