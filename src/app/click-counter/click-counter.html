<mat-card>
    <mat-card-header>
        <mat-card-title>Click Counter</mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <p>Current Count: {{ count }}</p>
    </mat-card-content>

    <mat-card-actions>
        <button matButton="outlined" (click)="increase()">+</button>
        <button matButton="outlined" (click)="decrease()">-</button>
        <button matButton="outlined" (click)="reset()">Reset</button>
    </mat-card-actions>
</mat-card>
